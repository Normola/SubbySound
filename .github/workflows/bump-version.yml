name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump & Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -oP '"\K[^"]+')
          CODE=$(grep 'versionCode' app/build.gradle | grep -oP '\d+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.version.outputs.name }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "name=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
          echo "code=$(( ${{ steps.version.outputs.code }} + 1 ))" >> $GITHUB_OUTPUT
          echo "tag=v${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

      - name: Update build.gradle
        run: |
          sed -i "s/versionCode ${{ steps.version.outputs.code }}/versionCode ${{ steps.next.outputs.code }}/" app/build.gradle
          sed -i "s/versionName \"${{ steps.version.outputs.name }}\"/versionName \"${{ steps.next.outputs.name }}\"/" app/build.gradle

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "chore: bump version to ${{ steps.next.outputs.name }}"
          git tag "${{ steps.next.outputs.tag }}"
          git push origin HEAD:main --follow-tags
