name: Android CI

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle          # caches ~/.gradle via setup-java built-in

      # ubuntu-latest ships Gradle; use it to generate the full wrapper (including
      # gradle-wrapper.jar) so ./gradlew works for all subsequent steps.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.1 --distribution-type bin

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Lint
        run: ./gradlew lintDebug

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: SubbySound-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
