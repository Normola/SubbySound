name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.1 --distribution-type bin

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          SIGNING_KEY_DER: ${{ secrets.SIGNING_KEY_DER }}
          SIGNING_CERT: ${{ secrets.SIGNING_CERT }}
        run: |
          echo "$SIGNING_KEY_DER" | base64 -d > private.der
          echo "$SIGNING_CERT" > cert.pem
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --key private.der \
            --cert cert.pem \
            --out app/build/outputs/apk/release/subbysound-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm private.der cert.pem

      - name: Install qrencode
        run: sudo apt-get install -y qrencode

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/SubbySound-${TAG}-signed.apk"
          QR_ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/qr.png"

          qrencode -o qr.png -s 10 "$APK_URL"

          gh api "repos/${REPO}/releases/generate-notes" \
            --method POST \
            -f tag_name="${TAG}" \
            --jq '.body' > notes.md || echo "" > notes.md

          printf '\n\n## Download\n\nScan to install the APK directly on your device:\n\n![QR Code](%s)\n' "$QR_ASSET_URL" >> notes.md

          APK_NAME="SubbySound-${TAG}-signed.apk"
          cp app/build/outputs/apk/release/subbysound-signed.apk "$APK_NAME"

          gh release create "${TAG}" \
            --title "SubbySound ${TAG}" \
            --notes-file notes.md \
            "$APK_NAME" \
            "qr.png"
